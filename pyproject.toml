[project]
name = "tga-team-gipsy-agent"
version = "0.1.0"
description = "CTF agent with a LangGraph-based agent core."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langgraph==1.2.7",
    "langchain-core==1.4.8",
    "pydantic==2.13.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
asyncio_mode = "auto"
